<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم | المحمودية مدينتي</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; }
        .hidden { display: none !important; }
        
        /* تصميم صفحة الدخول */
        #login-page { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        
        /* تصميم لوحة التحكم (الادمن) */
        #admin-panel { padding: 20px; max-width: 800px; margin: auto; }
        .post-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input, textarea { width: 95%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-blue { background: #1877f2; color: white; margin-top: 10px; }
        .btn-google { background: white; border: 1px solid #ddd; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-card">
        <h2>المحمودية مدينتي</h2>
        <p>تسجيل دخول الناشرين</p>
        
        <button class="btn btn-google" onclick="loginWithGoogle()">
            <img src="https://img.icons8.com/color/16/000000/google-logo.png"> الدخول بجوجل
        </button>
        
        <div style="margin: 15px 0; color: #888;">أو يدوي</div>
        
        <input type="password" id="passInput" placeholder="كلمة سر الفريق">
        <button class="btn btn-blue" onclick="manualLogin()">دخول</button>
    </div>
</div>

<div id="admin-panel" class="hidden">
    <div class="post-box">
        <h2>نشر خبر جديد 📝</h2>
        <p id="welcome-msg"></p>
        <input type="text" id="newsTitle" placeholder="عنوان الخبر (مثلاً: حالة الطقس)">
        <textarea id="newsContent" rows="5" placeholder="تفاصيل الخبر..."></textarea>
        <button class="btn btn-blue" onclick="uploadNews()">نشر الخبر الآن</button>
        <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; margin-top:20px;">تسجيل خروج</button>
    </div>
</div>

<script>
    // كلمة السر اللي أنت اخترتها
    const TEAM_PASS = "2009257ma";

    // 1. الدخول اليدوي
    function manualLogin() {
        const input = document.getElementById('passInput').value;
        if(input === TEAM_PASS) {
            showPanel("ناشر معتمد");
        } else {
            Swal.fire('خطأ', 'كلمة السر غلط يا مهند!', 'error');
        }
    }

    // 2. الدخول بجوجل (محاكاة - ستحتاج لربط Firebase الحقيقي)
    function loginWithGoogle() {
        // هنا نضع كود Firebase Auth الفعلي
        Swal.fire('جاري الربط', 'يتم التحقق من حساب جوجل...', 'info');
        setTimeout(() => showPanel("مستخدم جوجل"), 2000);
    }

    // وظيفة تبديل الصفحات
    function showPanel(user) {
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "أهلاً بك: " + user;
        Swal.fire('مرحباً', 'تم فتح لوحة النشر بنجاح', 'success');
    }

    // وظيفة النشر (ترسل البيانات لـ Firebase)
    function uploadNews() {
        const title = document.getElementById('newsTitle').value;
        const content = document.getElementById('newsContent').value;
        
        if(!title || !content) return Swal.fire('نقص بيانات', 'اكتب العنوان والتفاصيل الأول', 'warning');

        // هنا كود الـ Database.push
        Swal.fire('تم النشر!', 'الخبر متاح الآن لكل أهل المحمودية على الموقع', 'success');
        
        // مسح الخانات بعد النشر
        document.getElementById('newsTitle').value = "";
        document.getElementById('newsContent').value = "";
    }
</script>

</body>
</html>
