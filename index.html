<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المحمودية | النجم</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --primary: #007aff; --accent: #5856d6; --bg: #f2f2f7; 
            --card: #ffffff; --text: #1c1c1e; --shadow: rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg: #000000; --card: #1c1c1e; --text: #ffffff; --shadow: rgba(255,255,255,0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 90px; }

        /* الهيدر الزجاجي */
        header { 
            background: var(--card); backdrop-filter: blur(10px); padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 12px var(--shadow);
        }
        #siteLogo { width: 42px; height: 42px; border-radius: 12px; object-fit: cover; border: 2px solid var(--primary); }

        /* شريط القصص (Stories) */
        .stories-bar { display: flex; gap: 15px; overflow-x: auto; padding: 15px; scrollbar-width: none; }
        .story { min-width: 65px; text-align: center; }
        .story img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--primary); padding: 2px; }
        .story p { font-size: 11px; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .container { max-width: 500px; margin: 0 auto; padding: 0 15px; }

        /* الكروت المطورة */
        .post-card { 
            background: var(--card); border-radius: 20px; margin-bottom: 20px; 
            overflow: hidden; box-shadow: 0 8px 24px var(--shadow); border: 1px solid var(--shadow);
        }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .post-header img { width: 35px; height: 35px; border-radius: 50%; }
        .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; }
        
        .post-content { padding: 15px; }
        .post-content h3 { margin-bottom: 8px; font-size: 18px; }
        .post-content p { font-size: 14px; opacity: 0.8; line-height: 1.6; }

        /* الأزرار التفاعلية */
        .admin-sec { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        input, textarea { 
            width: 100%; padding: 14px; margin: 10px 0; border: none; 
            background: var(--bg); border-radius: 12px; color: var(--text); font-family: inherit;
        }
        .btn-main { 
            background: linear-gradient(45deg, var(--primary), var(--accent)); 
            color: #fff; border: none; padding: 15px; border-radius: 12px; 
            width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.95); opacity: 0.8; }

        /* الناف بار السفلي */
        .bottom-nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--card); 
            display: flex; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000;
            padding: 5px; border: 1px solid var(--shadow);
        }
        .nav-item { 
            flex: 1; padding: 12px; text-align: center; color: #8e8e93; 
            font-size: 20px; transition: 0.3s; border-radius: 20px;
        }
        .nav-item.active { color: var(--primary); background: var(--bg); }

        #maint-screen { 
            display:none; position:fixed; inset:0; background:var(--card); 
            z-index:9999; flex-direction:column; align-items:center; justify-content:center;
        }

        .preview-img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body data-theme="light">

<div id="maint-screen">
    <i class="fas fa-hammer fa-4x" style="color:var(--primary)"></i>
    <h2 style="margin-top:20px">نحن نطور المنصة</h2>
    <p>سنعود خلال دقائق..</p>
</div>

<header>
    <div style="display:flex; align-items:center; gap:10px">
        <img id="siteLogo" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
        <b id="siteNameDisplay">أخبار المحمودية</b>
    </div>
    <div style="display:flex; gap:15px">
        <i class="fas fa-moon" onclick="toggleTheme()" id="themeIcon"></i>
        <div id="userBtn" onclick="login()"><i class="fas fa-user-circle fa-lg"></i></div>
    </div>
</header>

<div class="stories-bar" id="stories">
    <div class="story"><img src="https://via.placeholder.com/60" alt="S"><p>عاجل</p></div>
    <div class="story"><img src="https://via.placeholder.com/60" alt="S"><p>المحمودية</p></div>
</div>

<div class="container">
    <div id="p-feed" class="page active">
        <div id="feed-items"></div>
    </div>

    <div id="p-add" class="page">
        <div class="admin-sec">
            <h3>📝 نشر محتوى جديد</h3>
            <input type="text" id="post-t" placeholder="ما هو الخبر؟">
            <textarea id="post-c" placeholder="التفاصيل..." rows="3"></textarea>
            <label style="display:block; padding:15px; border:2px dashed var(--primary); border-radius:12px; text-align:center; cursor:pointer">
                <i class="fas fa-cloud-upload-alt"></i> ارفع صورة احترافية
                <input type="file" id="post-f" hidden accept="image/*" onchange="preview(this, 'post-pre')">
            </label>
            <img id="post-pre" class="preview-img">
            <button class="btn-main" style="margin-top:15px" onclick="addPost()">نشر الآن</button>
        </div>
    </div>

    <div id="p-admin" class="page">
        <div class="admin-sec">
            <h3>⚙️ لوحة التحكم</h3>
            <input type="text" id="sn" placeholder="اسم المنصة">
            <input type="text" id="sl" placeholder="رابط الشعار">
            <button class="btn-main" onclick="saveSets()">تحديث الهوية</button>
        </div>
        <div class="admin-sec">
            <h3>🚧 إدارة الموقع</h3>
            <button class="btn-main" id="mBtn" style="background:#ff3b30" onclick="toggleMaint()">تحويل للصيانة</button>
            <button class="btn-main" style="background:#444; margin-top:10px" onclick="logout()">خروج</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="nav('p-feed', this)"><i class="fas fa-th-large"></i></div>
    <div class="nav-item" id="n-add" style="display:none" onclick="nav('p-add', this)"><i class="fas fa-plus-square"></i></div>
    <div class="nav-item" id="n-admin" style="display:none" onclick="nav('p-admin', this)"><i class="fas fa-crown"></i></div>
    <div class="nav-item" onclick="location.reload()"><i class="fas fa-redo-alt"></i></div>
</div>

<script>
    const _dbUrl = atob("aHR0cHM6Ly9tYWhtb2R5YS03M2UwMy1kZWZhdWx0LXJ0ZGIuZmlyZWJhc2Vpby5jb20v");
    firebase.initializeApp({ databaseURL: _dbUrl });
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('mahmoudya_user'));
    let tempImg = "";
    let isMaint = false;

    window.onload = () => {
        // إدارة الثيم (الوضع الليلي)
        if(localStorage.getItem('theme') === 'dark') toggleTheme();

        db.ref('settings').on('value', s => {
            const d = s.val() || {};
            isMaint = d.maintenance || false;
            document.getElementById('siteNameDisplay').innerText = d.name || "أخبار المحمودية";
            document.getElementById('siteLogo').src = d.logo || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
            
            if(isMaint && (!user || user.role !== 'owner')) {
                document.getElementById('maint-screen').style.display = 'flex';
            } else {
                document.getElementById('maint-screen').style.display = 'none';
            }

            if(user) updateUI();
            
            const mBtn = document.getElementById('mBtn');
            if(mBtn) mBtn.innerText = isMaint ? "إلغاء الصيانة" : "تحويل للصيانة";
        });

        loadFeed();
    };

    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('themeIcon');
        if(body.getAttribute('data-theme') === 'light') {
            body.setAttribute('data-theme', 'dark');
            icon.className = 'fas fa-sun';
            localStorage.setItem('theme', 'dark');
        } else {
            body.setAttribute('data-theme', 'light');
            icon.className = 'fas fa-moon';
            localStorage.setItem('theme', 'light');
        }
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function preview(input, preId) {
        if(input.files[0]) {
            let r = new FileReader();
            r.onload = e => {
                const pre = document.getElementById(preId);
                pre.src = e.target.result;
                pre.style.display = "block";
                tempImg = e.target.result;
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function updateUI() {
        document.getElementById('userBtn').innerHTML = `<img src="${user.pic}" style="width:32px;height:32px;border-radius:50%">`;
        document.getElementById('n-add').style.display = 'block';
        if(user.role === 'owner') document.getElementById('n-admin').style.display = 'block';
    }

    function addPost() {
        const t = document.getElementById('post-t').value;
        const c = document.getElementById('post-c').value;
        if(!t || !c) return Swal.fire('تنبيه', 'برجاء كتابة عنوان وتفاصيل الخبر', 'warning');
        
        db.ref('posts').push({
            title: t, content: c, img: tempImg,
            author: user.name, authorPic: user.pic,
            time: Date.now()
        }).then(() => {
            Swal.fire({ title: 'تم النشر!', icon: 'success', timer: 1500 });
            setTimeout(() => location.reload(), 1500);
        });
    }

    function loadFeed() {
        db.ref('posts').limitToLast(20).on('value', s => {
            const div = document.getElementById('feed-items');
            div.innerHTML = "";
            let posts = [];
            s.forEach(c => { posts.push(c.val()); });
            posts.reverse().forEach(p => {
                div.innerHTML += `
                <div class="post-card">
                    <div class="post-header">
                        <img src="${p.authorPic || 'https://via.placeholder.com/35'}">
                        <div>
                            <b>${p.author}</b><br>
                            <small style="opacity:0.5">${new Date(p.time).toLocaleTimeString('ar-EG')}</small>
                        </div>
                    </div>
                    ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                    <div class="post-content">
                        <h3>${p.title}</h3>
                        <p>${p.content}</p>
                    </div>
                </div>`;
            });
        });
    }

    async function login() {
        if(user) return Swal.fire('أهلاً بك', user.name, 'info');
        const { value: p } = await Swal.fire({ 
            title: 'بوابة المالك', 
            input: 'password',
            inputPlaceholder: 'كلمة السر هنا',
            confirmButtonColor: '#007aff'
        });
        if(p === "2009257mama") {
            db.ref('settings/ownerPic').once('value', s => {
                localStorage.setItem('mahmoudya_user', JSON.stringify({ role: 'owner', name: 'النجم', pic: s.val() || "" }));
                location.reload();
            });
        }
    }

    function saveSets() {
        const updates = {
            name: document.getElementById('sn').value,
            logo: document.getElementById('sl').value
        };
        db.ref('settings').update(updates).then(() => Swal.fire('تم التحديث'));
    }

    function toggleMaint() {
        db.ref('settings').update({ maintenance: !isMaint });
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
