<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة أخبار المحمودية - النسخة الاحترافية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #1a73e8; --owner: #673ab7; --bg: #f0f2f5; --text: #1c1e21; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: white; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); sticky: top; }
        .container { max-width: 600px; margin: 20px auto; padding: 10px; }
        .panel { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .news-card { background: white; border-radius: 15px; margin-bottom: 20px; overflow: hidden; border: 1px solid #ddd; }
        .news-card img { width: 100%; max-height: 400px; object-fit: cover; }
        .news-content { padding: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { cursor: pointer; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-owner { background: var(--owner); color: white; }
        .logout-btn { background: #ff4757; color: white; width: auto; font-size: 0.8rem; }
        .pending-badge { background: #ff9f43; color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; }
    </style>
</head>
<body>

<header>
    <h2 style="color:var(--primary); margin:0;">أخبار المحمودية</h2>
    <div id="user-info">
        <button class="btn" onclick="startLogin()">دخول</button>
    </div>
</header>

<div class="container">
    <div id="owner-panel" class="panel" style="display:none; border-top: 5px solid var(--owner);">
        <h3 style="color:var(--owner)">لوحة التحكم (المالك)</h3>
        <div id="pending-requests"></div> <hr>
        <h4>أخبار تنتظر مراجعتك:</h4>
        <div id="waiting-news"></div> <button class="btn logout-btn" onclick="logout()">تسجيل خروج</button>
    </div>

    <div id="publisher-panel" class="panel" style="display:none; border-top: 5px solid var(--primary);">
        <h3>إضافة خبر جديد</h3>
        <input type="text" id="postTitle" placeholder="عنوان الخبر">
        <textarea id="postContent" rows="4" placeholder="تفاصيل الخبر..."></textarea>
        <input type="text" id="postImg" placeholder="رابط الصورة (ImgBB)">
        <button class="btn btn-blue" onclick="submitPost()">إرسال للمراجعة</button>
        <button class="btn logout-btn" onclick="logout()" style="margin-top:15px">تسجيل خروج</button>
    </div>

    <div id="feed"></div>
</div>

<script>
    // تكوين Firebase
    const firebaseConfig = {
        databaseURL: "https://mahmodya-73e03-default-rtdb.firebaseio.com",
        projectId: "mahmodya-73e03",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userData = JSON.parse(localStorage.getItem('mahmoudya_user'));

    // التحقق من الجلسة المحفوظة عند فتح الموقع
    window.onload = () => {
        if (userData) {
            applyLogin(userData);
        }
        loadFeed();
    };

    function startLogin() {
        Swal.fire({
            title: 'تسجيل الدخول',
            input: 'password',
            inputPlaceholder: 'أدخل كلمة المرور',
            confirmButtonText: 'دخول'
        }).then((result) => {
            const pass = result.value;
            if (pass === "2009257mama") {
                saveAndApply({ role: 'owner', name: 'المالك النجم' });
            } else if (pass === "2009257ma") {
                askPublisherInfo();
            }
        });
    }

    function askPublisherInfo() {
        Swal.fire({
            title: 'بيانات الناشر',
            html: '<input id="sw-n" class="swal2-input" placeholder="الاسم"><input id="sw-p" class="swal2-input" placeholder="الموبايل">',
            preConfirm: () => [document.getElementById('sw-n').value, document.getElementById('sw-p').value]
        }).then((res) => {
            const [name, phone] = res.value;
            if (name && phone) {
                db.ref('approved_publishers').child(phone).once('value', s => {
                    if (s.exists()) {
                        saveAndApply({ role: 'publisher', name, phone });
                    } else {
                        db.ref('pending_publishers').child(phone).set({ name, phone });
                        Swal.fire('انتظر الموافقة', 'تم إرسال طلبك للمالك.', 'info');
                    }
                });
            }
        });
    }

    function saveAndApply(data) {
        localStorage.setItem('mahmoudya_user', JSON.stringify(data));
        userData = data;
        applyLogin(data);
    }

    function applyLogin(data) {
        document.getElementById('user-info').innerHTML = `<span>${data.name}</span>`;
        if (data.role === 'owner') {
            document.getElementById('owner-panel').style.display = 'block';
            loadOwnerData();
        } else {
            document.getElementById('publisher-panel').style.display = 'block';
        }
    }

    function logout() {
        localStorage.removeItem('mahmoudya_user');
        location.reload();
    }

    // الناشر يرسل الخبر (بانتظار الموافقة)
    function submitPost() {
        const title = document.getElementById('postTitle').value;
        const content = document.getElementById('postContent').value;
        let img = document.getElementById('postImg').value;
        
        if (!title || !content) return Swal.fire('خطأ', 'أكمل البيانات', 'error');

        // تنظيف رابط الصورة
        if (img.includes('[img]')) img = img.match(/\[img\](.*?)\[\/img\]/)[1];

        db.ref('news_posts').push({
            title, content, image: img,
            author: userData.name,
            phone: userData.phone || 'إدارة',
            status: 'pending', // الخبر معلق
            time: Date.now()
        }).then(() => {
            Swal.fire('تم الإرسال', 'سيظهر الخبر بعد مراجعة المالك.', 'success');
            document.getElementById('postTitle').value = "";
            document.getElementById('postContent').value = "";
            document.getElementById('postImg').value = "";
        });
    }

    // جلب طلبات الناشرين والأخبار المعلقة للمالك
    function loadOwnerData() {
        // طلبات الناشرين الجدد
        db.ref('pending_publishers').on('value', s => {
            const div = document.getElementById('pending-requests');
            div.innerHTML = s.exists() ? "<h4>طلبات انضمام:</h4>" : "";
            s.forEach(c => {
                const p = c.val();
                div.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; background:#f8f0ff; padding:10px; border-radius:8px;">
                    <span>${p.name} (${p.phone})</span>
                    <button class="approve-btn" style="background:green; color:white; border:none; border-radius:5px;" onclick="approvePub('${p.name}','${p.phone}')">موافقة</button>
                </div>`;
            });
        });

        // أخبار بانتظار الموافقة
        db.ref('news_posts').on('value', s => {
            const div = document.getElementById('waiting-news');
            div.innerHTML = "";
            s.forEach(c => {
                const post = c.val();
                if (post.status === 'pending') {
                    div.innerHTML += `<div style="border:1px solid #ddd; padding:10px; margin-bottom:10px; border-radius:8px;">
                        <strong>${post.title}</strong><br><small>بواسطة: ${post.author}</small><br>
                        <button class="btn btn-blue" style="width:auto; padding:5px 15px;" onclick="approvePost('${c.key}')">موافقة ونشر</button>
                        <button class="btn" style="width:auto; padding:5px 15px; background:red; color:white;" onclick="deletePost('${c.key}')">حذف</button>
                    </div>`;
                }
            });
        });
    }

    function approvePub(n, p) {
        db.ref('approved_publishers').child(p).set({ name: n }).then(() => {
            db.ref('pending_publishers').child(p).remove();
        });
    }

    function approvePost(key) {
        db.ref('news_posts').child(key).update({ status: 'approved' });
    }

    function deletePost(key) {
        db.ref('news_posts').child(key).remove();
    }

    // عرض الأخبار "الموافقة فقط" للعامة
    function loadFeed() {
        db.ref('news_posts').on('value', s => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            let posts = [];
            s.forEach(c => {
                let p = c.val();
                p.key = c.key;
                if (p.status === 'approved' || userData?.role === 'owner') {
                    posts.push(p);
                }
            });
            posts.reverse().forEach(p => {
                feed.innerHTML += `
                    <div class="news-card">
                        ${p.image ? `<img src="${p.image}">` : ''}
                        <div class="news-content">
                            ${p.status === 'pending' ? '<span class="pending-badge">بانتظار المراجعة</span>' : ''}
                            <h3 style="margin-top:5px;">${p.title}</h3>
                            <p>${p.content}</p>
                            <small style="color:#777">بواسطة: ${p.author} | ${new Date(p.time).toLocaleString('ar-EG')}</small>
                        </div>
                    </div>`;
            });
        });
    }
</script>
</body>
</html>
