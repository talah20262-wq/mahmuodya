<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية النجم الإخبارية v3.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

    <style>
        /* نظام الألوان المتطور (Dynamic Theme Engine) */
        :root {
            --primary: #007aff; --secondary: #5856d6; --accent: #ff9500;
            --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e;
            --danger: #ff3b30; --success: #34c759; --king: #ffeb3b;
        }
        [data-theme="dark"] {
            --bg: #000000; --card: #1c1c1e; --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; transition: background 0.3s; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }

        /* الهيدر الاحترافي */
        header {
            background: rgba(var(--card), 0.8); backdrop-filter: blur(10px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 45px; height: 45px; border-radius: 12px; border: 2px solid var(--primary); box-shadow: 0 4px 10px rgba(0,122,255,0.3); }

        /* الحاويات */
        .main-container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .page-section { display: none; min-height: 80vh; }
        .page-section.active { display: block; animation: fadeInUp 0.5s ease; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تصميم الكروت (News Cards) */
        .news-card {
            background: var(--card); border-radius: 24px; margin-bottom: 25px;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative; border: 1px solid rgba(0,0,0,0.03);
        }
        .card-header { padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        .crown-badge { background: var(--king); color: #000; font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .news-image { width: 100%; max-height: 350px; object-fit: cover; cursor: pointer; }
        .news-content { padding: 20px; }
        .news-content h2 { font-size: 1.3rem; margin-bottom: 10px; font-weight: 800; color: var(--primary); }
        .news-content p { font-size: 15px; line-height: 1.7; opacity: 0.9; }

        /* أزرار التفاعل */
        .card-actions { padding: 10px 20px; display: flex; gap: 20px; border-top: 1px solid rgba(0,0,0,0.05); }
        .action-btn { background: none; border: none; color: #8e8e93; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: 600; }
        .action-btn.liked { color: var(--danger); }

        /* نظام الدردشة الاحترافي */
        .chat-wrap { height: calc(100vh - 180px); display: flex; flex-direction: column; }
        #chat-render { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 20px; position: relative; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .bubble.me { align-self: flex-start; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .bubble.he { align-self: flex-end; background: #e9e9eb; color: #000; border-bottom-left-radius: 4px; }
        [data-theme="dark"] .bubble.he { background: #2c2c2e; color: #fff; }

        /* شريط الإدخال السفلي */
        .bottom-dock {
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: var(--card);
            border-radius: 30px; padding: 8px 15px; display: flex; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 1001;
        }
        .bottom-dock input { flex: 1; border: none; background: none; padding: 10px; color: var(--text); font-family: inherit; }

        /* شريط التنقل الرئيسي */
        .main-nav {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 450px; background: rgba(var(--card), 0.9);
            backdrop-filter: blur(20px); border-radius: 35px; display: flex;
            justify-content: space-around; padding: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); z-index: 1002;
        }
        .nav-link { color: #8e8e93; font-size: 24px; transition: 0.3s; position: relative; }
        .nav-link.active { color: var(--primary); transform: translateY(-5px); }
        .nav-link.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--primary); border-radius: 50%; }

        /* لوحة التحكم للمالك */
        .admin-panel { background: var(--card); border-radius: 25px; padding: 25px; border: 2px dashed var(--primary); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 14px; }
        .master-btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }

        /* وضع الصيانة */
        #maintenance-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="maintenance-screen">
    <div style="background: var(--card); padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);">
        <i class="fas fa-hammer-war fa-4x" style="color: var(--primary);"></i>
        <h1 style="margin-top: 20px;">المنصة تحت التطوير</h1>
        <p style="opacity: 0.7;">نعمل حالياً على إضافة ميزات خرافية.. انتظرونا!</p>
    </div>
</div>

<header>
    <div class="brand">
        <img id="siteLogo" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="logo-img">
        <div>
            <b id="siteName" style="font-size: 18px;">نجم المحمودية</b><br>
            <span style="color: var(--success); font-size: 10px; font-weight: bold;"><i class="fas fa-signal"></i> مباشر الآن</span>
        </div>
    </div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <i class="fas fa-adjust" onclick="toggleTheme()" style="cursor: pointer; font-size: 20px;"></i>
        <div id="authBtn" onclick="tryAdminLogin()"><i class="fas fa-shield-alt fa-lg"></i></div>
    </div>
</header>

<div class="main-container">
    
    <section id="page-feed" class="page-section active">
        <div id="news-stream">
            </div>
    </section>

    <section id="page-chat" class="page-section">
        <div class="chat-wrap">
            <div id="chat-render"></div>
        </div>
    </section>

    <section id="page-admin" class="page-section">
        <div class="admin-panel">
            <h2 style="margin-bottom: 20px; color: var(--primary); text-align: center;">🛡️ غرفة العمليات الملكية</h2>
            
            <div class="input-group">
                <label>عنوان الخبر العاجل</label>
                <input type="text" id="adm-title" placeholder="اكتب عنواناً جذاباً...">
            </div>

            <div class="input-group">
                <label>محتوى الخبر</label>
                <textarea id="adm-body" rows="5" placeholder="تفاصيل الخبر بالكامل..."></textarea>
            </div>

            <div class="input-group">
                <label>صورة الخبر (اختياري)</label>
                <input type="file" id="adm-file" hidden onchange="handleImg(this)">
                <button class="master-btn" style="background: #f0f2f5; color: #000;" onclick="document.getElementById('adm-file').click()"><i class="fas fa-camera"></i> إضافة صورة من الجهاز</button>
            </div>

            <button class="master-btn" style="background: var(--primary); color: #fff;" onclick="postToFirebase()">🚀 نشر الخبر للمتابعين</button>
            
            <hr style="margin: 25px 0; opacity: 0.1;">
            
            <button class="master-btn" id="maintBtn" onclick="toggleMaintMode()" style="background: var(--danger); color: #fff;">قفل الموقع (وضع الصيانة)</button>
            <button class="master-btn" onclick="logoutAdmin()" style="background: #444; color: #fff; margin-top: 10px;">تسجيل خروج الإدارة</button>
        </div>
    </section>

</div>

<div class="bottom-dock" id="chat-input-dock" style="display: none;">
    <input type="text" id="chat-msg-field" placeholder="اكتب رسالتك للمجتمع...">
    <i class="fas fa-paper-plane" onclick="sendToChat()" style="color: var(--primary); cursor: pointer; font-size: 22px;"></i>
</div>

<nav class="main-nav">
    <div class="nav-link active" onclick="switchTab('page-feed', this)"><i class="fas fa-th-large"></i></div>
    <div class="nav-link" onclick="switchTab('page-chat', this)"><i class="fas fa-paper-plane"></i></div>
    <div class="nav-link" id="admin-nav" style="display: none;" onclick="switchTab('page-admin', this)"><i class="fas fa-crown"></i></div>
    <div class="nav-link" onclick="location.reload()"><i class="fas fa-redo-alt"></i></div>
</nav>

<script>
    // تهيئة المحرك
    const _secret = atob("aHR0cHM6Ly9tYWhtb2R5YS03M2UwMy1kZWZhdWx0LXJ0ZGIuZmlyZWJhc2Vpby5jb20v");
    firebase.initializeApp({ databaseURL: _secret });
    const database = firebase.database();

    let currentUser = JSON.parse(localStorage.getItem('user_data')) || { role: 'guest', name: 'متابع مجهول' };
    let tempImg = "";
    let isUnderMaint = false;

    window.onload = () => {
        // مراقبة إعدادات الموقع
        database.ref('settings').on('value', snap => {
            const data = snap.val() || {};
            isUnderMaint = data.maintenance;
            document.getElementById('siteName').innerText = data.name || "إمبراطورية النجم";
            
            if(isUnderMaint && currentUser.role !== 'owner') {
                document.getElementById('maintenance-screen').style.display = 'flex';
            } else {
                document.getElementById('maintenance-screen').style.display = 'none';
            }

            const mBtn = document.getElementById('maintBtn');
            if(mBtn) mBtn.innerText = isUnderMaint ? "إيقاف وضع الصيانة" : "تفعيل وضع الصيانة";
        });

        // التأكد من الصلاحيات
        if(currentUser.role === 'owner') {
            document.getElementById('admin-nav').style.display = 'block';
            document.body.classList.add('admin-mode');
        }

        renderFeed();
        renderChat();
    };

    // التبديل بين الصفحات
    function switchTab(id, el) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        
        document.getElementById('chat-input-dock').style.display = (id === 'page-chat') ? 'flex' : 'none';
    }

    // تسجيل دخول المالك
    async function tryAdminLogin() {
        if(currentUser.role === 'owner') return;
        const { value: pass } = await Swal.fire({
            title: 'مساحة المالك',
            input: 'password',
            inputPlaceholder: 'أدخل الرمز السري...',
            confirmButtonColor: '#007aff'
        });

        if(pass === "2009257mama") {
            currentUser = { role: 'owner', name: 'النجم الملكي', id: 'star_king_01' };
            localStorage.setItem('user_data', JSON.stringify(currentUser));
            location.reload();
        }
    }

    // معالجة الصور
    function handleImg(input) {
        if(input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { tempImg = e.target.result; Swal.fire('تم تجهيز الصورة للنشر!'); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // نشر الخبر
    function postToFirebase() {
        const title = document.getElementById('adm-title').value;
        const body = document.getElementById('adm-body').value;
        if(!title || !body) return Swal.fire('خطأ', 'يرجى ملء كافة الخانات', 'error');

        database.ref('posts').push({
            title: title, content: body, image: tempImg,
            timestamp: Date.now(), author: currentUser.name, authorID: currentUser.id
        }).then(() => {
            Swal.fire('تم النشر!', 'خبرك الآن متاح للجميع', 'success');
            document.getElementById('adm-title').value = "";
            document.getElementById('adm-body').value = "";
            tempImg = "";
            switchTab('page-feed', document.querySelector('.nav-link'));
        });
    }

    // عرض الأخبار
    function renderFeed() {
        database.ref('posts').on('value', snap => {
            const container = document.getElementById('news-stream');
            container.innerHTML = "";
            let dataArr = [];
            snap.forEach(child => { 
                let item = child.val(); 
                item.key = child.key; 
                dataArr.push(item); 
            });

            dataArr.reverse().forEach(post => {
                const isKing = post.authorID === 'star_king_01';
                container.innerHTML += `
                    <div class="news-card">
                        ${currentUser.role === 'owner' ? `<i class="fas fa-times-circle" style="position:absolute; left:15px; top:15px; color:red; cursor:pointer" onclick="deleteItem('${post.key}')"></i>` : ''}
                        <div class="card-header">
                            <div class="user-info">
                                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="user-avatar">
                                <div>
                                    <b>${post.author}</b> ${isKing ? '<span class="crown-badge">المالك الكنج</span>' : ''}<br>
                                    <small style="opacity:0.5">${moment(post.timestamp).fromNow()}</small>
                                </div>
                            </div>
                            <i class="fas fa-ellipsis-v" style="opacity:0.3"></i>
                        </div>
                        ${post.image ? `<img src="${post.image}" class="news-image">` : ''}
                        <div class="news-content">
                            <h2>${post.title}</h2>
                            <p>${post.content}</p>
                        </div>
                        <div class="card-actions">
                            <div class="action-btn"><i class="far fa-heart"></i> 15</div>
                            <div class="action-btn"><i class="far fa-comment"></i> 3</div>
                            <div class="action-btn"><i class="far fa-share-square"></i></div>
                        </div>
                    </div>`;
            });
        });
    }

    // نظام الدردشة
    function sendToChat() {
        const txt = document.getElementById('chat-msg-field').value;
        if(!txt) return;
        database.ref('global_chat').push({
            name: currentUser.name, text: txt, role: currentUser.role, time: Date.now()
        }).then(() => { document.getElementById('chat-msg-field').value = ""; });
    }

    function renderChat() {
        database.ref('global_chat').limitToLast(40).on('value', snap => {
            const chatBox = document.getElementById('chat-render');
            chatBox.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                const isMe = m.name === currentUser.name;
                chatBox.innerHTML += `
                <div class="bubble ${isMe ? 'me' : 'he'}">
                    <b style="font-size:10px; opacity:0.7; display:block">${m.name} ${m.role==='owner'?'👑':''}</b>
                    ${m.text}
                </div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    function deleteItem(key) {
        Swal.fire({ title: 'حذف الخبر؟', showCancelButton: true, confirmButtonColor: 'red' }).then(res => {
            if(res.isConfirmed) database.ref('posts').child(key).remove();
        });
    }

    function toggleTheme() {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
    }

    function toggleMaintMode() {
        database.ref('settings').update({ maintenance: !isUnderMaint });
    }

    function logoutAdmin() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
