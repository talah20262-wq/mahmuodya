<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية النجم الشاملة | 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #007aff;
            --accent: #5856d6;
            --bg: #f2f2f7;
            --card: #ffffff;
            --text: #1c1c1e;
            --gold: #ffcc00;
            --red: #ff3b30;
            --green: #34c759;
            --glass: rgba(255, 255, 255, 0.7);
        }

        [data-theme="dark"] {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --glass: rgba(28, 28, 30, 0.8);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.4s ease;
            overflow-x: hidden;
            padding-bottom: 110px;
        }

        /* --- الهيدر الملكي --- */
        header {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 2000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .site-identity { display: flex; align-items: center; gap: 12px; }
        .site-identity img {
            width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }
        .site-identity h1 { font-size: 18px; font-weight: 900; }

        /* --- الإعلان المنبثق المحترف --- */
        #ad-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.9); z-index: 9999;
            align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(8px);
        }
        .ad-modal {
            background: var(--card); width: 100%; max-width: 420px;
            border-radius: 35px; padding: 30px; text-align: center;
            position: relative; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .ad-modal img { width: 100%; border-radius: 20px; margin-bottom: 15px; }

        /* --- الحاويات والصفحات --- */
        .container { max-width: 650px; margin: 0 auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* --- الكروت --- */
        .card {
            background: var(--card); border-radius: 28px; padding: 22px;
            margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.1); position: relative;
            overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; right: 0; width: 5px; height: 100%;
            background: var(--primary); opacity: 0.8;
        }

        /* --- نظام الحالات (Status) --- */
        .badge {
            font-size: 10px; padding: 4px 10px; border-radius: 8px;
            font-weight: 900; text-transform: uppercase;
        }
        .pending { background: #ff9500; color: #fff; }
        .approved { background: var(--green); color: #fff; }
        .rejected { background: var(--red); color: #fff; }

        /* --- المدخلات --- */
        input, textarea, select {
            width: 100%; padding: 16px; margin: 12px 0; border-radius: 18px;
            border: 1px solid rgba(0,0,0,0.1); background: var(--bg); color: var(--text);
            font-size: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,122,255,0.15); }

        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 16px;
        }
        .btn-p { background: var(--primary); color: #fff; }
        .btn-s { background: var(--green); color: #fff; }
        .btn-d { background: var(--red); color: #fff; }
        .btn:active { transform: scale(0.95); }

        /* --- الملاحة السفلية --- */
        nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 480px; background: var(--card);
            border-radius: 40px; display: flex; justify-content: space-around;
            padding: 18px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); z-index: 5000;
        }
        .n-item { color: #8e8e93; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .n-item.active { color: var(--primary); transform: translateY(-10px); }

        /* لوحة التحكم الخاصة بالمالك */
        .admin-action-bar { display: flex; gap: 8px; margin-top: 15px; }
        .admin-action-bar button { flex: 1; padding: 10px; font-size: 12px; border-radius: 10px; }
    </style>
</head>
<body data-theme="light">

    <div id="ad-overlay">
        <div class="ad-modal">
            <i class="fas fa-times" onclick="closeAd()" style="position:absolute; top:20px; left:20px; cursor:pointer; font-size:22px; opacity:0.3"></i>
            <img id="ad-view-img" src="" style="display:none">
            <h2 id="ad-view-title" style="color:var(--primary); margin-bottom:12px"></h2>
            <p id="ad-view-body" style="line-height:1.7; margin-bottom:20px; opacity:0.8"></p>
            <button class="btn btn-p" onclick="closeAd()">فهمت، استكمال</button>
        </div>
    </div>

    <header>
        <div class="site-identity">
            <img id="site-logo" src="">
            <div>
                <h1 id="site-title">تحميل...</h1>
                <small style="color:var(--green); font-weight:bold"><i class="fas fa-circle" style="font-size:8px"></i> النظام نشط</small>
            </div>
        </div>
        <div style="display:flex; gap:20px; align-items:center">
            <i class="fas fa-adjust" onclick="toggleTheme()" style="font-size:20px; cursor:pointer"></i>
            <i class="fas fa-crown" onclick="openAdmin()" style="font-size:22px; color:var(--gold); cursor:pointer"></i>
        </div>
    </header>

    <div class="container">
        <main id="page-home" class="page active">
            <div id="feed-container"></div>
        </main>

        <section id="page-ads" class="page">
            <div class="card">
                <h2 style="text-align:center; margin-bottom:15px">🏢 بوابة المعلنين</h2>
                <p style="font-size:13px; text-align:center; opacity:0.7; margin-bottom:20px">ارفع إعلانك الآن، وسيقوم المالك بمراجعته والموافقة عليه.</p>
                
                <label>عنوان الإعلان:</label>
                <input type="text" id="adv-title" placeholder="مثلاً: خصم 50% على الأحذية">
                
                <label>وصف الإعلان:</label>
                <textarea id="adv-body" rows="5" placeholder="اكتب تفاصيل إعلانك هنا بوضوح..."></textarea>
                
                <button class="btn btn-p" onclick="requestAd()">إرسال للمراجعة الملكية</button>
            </div>

            <div id="advertiser-status">
                </div>
        </section>

        <section id="page-owner" class="page">
            <div class="card" style="border: 2px solid var(--gold); background: rgba(255,204,0,0.05);">
                <h3 style="margin-bottom:15px">👑 إعدادات الملك</h3>
                <button class="btn btn-p" style="margin-bottom:10px" onclick="setupPopup()">⚙️ ضبط الإعلان المنبثق</button>
                <button class="btn btn-s" onclick="publishOfficialNews()">📢 نشر خبر رسمي باسمي</button>
            </div>

            <h3 style="margin:20px 0 10px"><i class="fas fa-clock"></i> طلبات المعلنين (تحت المراجعة)</h3>
            <div id="owner-pending"></div>

            <h3 style="margin:30px 0 10px"><i class="fas fa-check-circle"></i> الأخبار المنشورة حالياً</h3>
            <div id="owner-published"></div>
        </section>
    </div>

    <nav>
        <div class="n-item active" onclick="navTo('page-home', this)"><i class="fas fa-home"></i></div>
        <div class="n-item" onclick="navTo('page-ads', this)"><i class="fas fa-bullhorn"></i></div>
        <div id="nav-crown" class="n-item" style="display:none" onclick="navTo('page-owner', this)"><i class="fas fa-user-shield"></i></div>
    </nav>

    <script>
        // تكوين Firebase (الرابط المستخلص من ملفاتك)
        const fbConfig = { databaseURL: atob("aHR0cHM6Ly9tYWhtb2R5YS03M2UwMy1kZWZhdWx0LXJ0ZGIuZmlyZWJhc2Vpby5jb20v") };
        firebase.initializeApp(fbConfig);
        const rdb = firebase.database();

        let session = JSON.parse(localStorage.getItem('user_session')) || { role: 'guest' };

        window.onload = () => {
            syncUI();
            fetchNews();
            checkGlobalAd();
            if(session.role === 'owner') {
                document.getElementById('nav-crown').style.display = 'block';
                syncOwnerPanel();
            }
        };

        function navTo(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.n-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        // --- وظائف المعلن ---
        function requestAd() {
            const t = document.getElementById('adv-title').value;
            const b = document.getElementById('adv-body').value;
            if(!t || !b) return Swal.fire('خطأ', 'كمل البيانات يا بطل', 'error');

            rdb.ref('cms_content').push({
                title: t, body: b, status: 'pending', time: Date.now(), type: 'advertiser'
            }).then(() => {
                Swal.fire('تم بنجاح', 'إعلانك وصل للمالك، انتظر الموافقة', 'success');
                document.getElementById('adv-title').value = '';
                document.getElementById('adv-body').value = '';
            });
        }

        // --- وظائف المالك (التحكم الكامل) ---
        function syncOwnerPanel() {
            rdb.ref('cms_content').on('value', snap => {
                const pend = document.getElementById('owner-pending');
                const pub = document.getElementById('owner-published');
                pend.innerHTML = ''; pub.innerHTML = '';

                snap.forEach(child => {
                    const data = child.val();
                    const key = child.key;
                    const cardHtml = `
                        <div class="card">
                            <span class="badge ${data.status}">${data.status === 'pending' ? 'مطلوب مراجعته' : 'منشور الآن'}</span>
                            <h4 style="margin:10px 0">${data.title}</h4>
                            <p style="font-size:13px; opacity:0.8">${data.body}</p>
                            <div class="admin-action-bar">
                                ${data.status === 'pending' ? `<button class="btn btn-s" onclick="updateStatus('${key}', 'approved')">✅ موافقة</button>` : ''}
                                <button class="btn btn-p" onclick="editNews('${key}', '${data.title}', '${data.body}')">📝 تعديل</button>
                                <button class="btn btn-d" onclick="deleteNews('${key}')">🗑️ حذف</button>
                            </div>
                        </div>`;
                    
                    if(data.status === 'pending') pend.innerHTML += cardHtml;
                    else pub.innerHTML += cardHtml;
                });
            });
        }

        function updateStatus(id, newStatus) {
            rdb.ref(`cms_content/${id}`).update({ status: newStatus })
            .then(() => Swal.fire('تم', 'تم تحديث حالة الخبر بنجاح', 'success'));
        }

        async function editNews(id, t, b) {
            const { value: form } = await Swal.fire({
                title: 'تعديل الخبر',
                html: `<input id="et" class="swal2-input" value="${t}"><textarea id="eb" class="swal2-textarea">${b}</textarea>`,
                preConfirm: () => [document.getElementById('et').value, document.getElementById('eb').value]
            });
            if(form) rdb.ref(`cms_content/${id}`).update({ title: form[0], body: form[1] });
        }

        function deleteNews(id) {
            Swal.fire({ title: 'حذف نهائي؟', icon: 'warning', showCancelButton: true }).then(r => { if(r.isConfirmed) rdb.ref(`cms_content/${id}`).remove(); });
        }

        function publishOfficialNews() {
            Swal.fire({
                title: 'خبر ملكي رسمي',
                html: `<input id="nt" class="swal2-input" placeholder="عنوان الخبر"><textarea id="nb" class="swal2-textarea" placeholder="محتوى الخبر الرسمي..."></textarea>`,
                preConfirm: () => [document.getElementById('nt').value, document.getElementById('nb').value]
            }).then(r => {
                if(r.value) rdb.ref('cms_content').push({ title: r.value[0], body: r.value[1], status: 'approved', type: 'owner', time: Date.now() });
            });
        }

        // --- نظام العرض (Home) ---
        function fetchNews() {
            rdb.ref('cms_content').on('value', snap => {
                const feed = document.getElementById('feed-container');
                feed.innerHTML = '';
                let items = [];
                snap.forEach(x => { if(x.val().status === 'approved') items.push(x.val()); });
                items.reverse().forEach(i => {
                    feed.innerHTML += `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:center">
                                <b style="color:var(--primary)"><i class="fas fa-crown"></i> ${i.type === 'owner' ? 'المالك' : 'إعلان معتمد'}</b>
                                <small style="opacity:0.4">${new Date(i.time).toLocaleTimeString()}</small>
                            </div>
                            <h2 style="margin:12px 0; font-size:20px">${i.title}</h2>
                            <p style="line-height:1.8; font-size:15px">${i.body}</p>
                        </div>`;
                });
            });
        }

        // --- إعدادات الإعلان المنبثق ---
        async function setupPopup() {
            const { value: pData } = await Swal.fire({
                title: 'إعداد الـ Popup',
                html: `<input id="pt" class="swal2-input" placeholder="العنوان"><textarea id="pb" class="swal2-textarea" placeholder="النص"></textarea><input id="pi" class="swal2-input" placeholder="رابط صورة (اختياري)">`,
                showDenyButton: true, denyButtonText: 'تعطيل الإعلان', confirmButtonText: 'تفعيل الآن'
            });
            if(pData) {
                rdb.ref('global_ad').set({ active: true, title: document.getElementById('pt').value, body: document.getElementById('pb').value, img: document.getElementById('pi').value });
            } else if (Swal.getContent() === null) {
                rdb.ref('global_ad/active').set(false);
            }
        }

        function checkGlobalAd() {
            rdb.ref('global_ad').on('value', s => {
                const d = s.val();
                if(d && d.active && !sessionStorage.popSeen) {
                    document.getElementById('ad-overlay').style.display = 'flex';
                    document.getElementById('ad-view-title').innerText = d.title;
                    document.getElementById('ad-view-body').innerText = d.body;
                    if(d.img) {
                        document.getElementById('ad-view-img').src = d.img;
                        document.getElementById('ad-view-img').style.display = 'block';
                    }
                }
            });
        }

        // --- الحماية والدخول ---
        async function openAdmin() {
            if(session.role === 'owner') return navTo('page-owner', document.getElementById('nav-crown'));
            const { value: pass } = await Swal.fire({ title: 'كلمة سر الملك', input: 'password' });
            if(pass === "2009257mama") {
                session.role = 'owner';
                localStorage.setItem('user_session', JSON.stringify(session));
                location.reload();
            }
        }

        function syncUI() {
            rdb.ref('settings').on('value', s => {
                const d = s.val() || {};
                document.getElementById('site-title').innerText = d.name || "إمبراطورية النجم";
                document.getElementById('site-logo').src = d.logo || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
            });
        }

        function closeAd() { document.getElementById('ad-overlay').style.display = 'none'; sessionStorage.popSeen = 1; }
        function toggleTheme() { 
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', theme);
        }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
