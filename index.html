<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitleTag">المحمودية مدينتي</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #0056b3; --accent: #ff4757; --bg: #f8f9fa; --text: #2d3436; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        
        /* الهيدر الجديد */
        header { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        header h1 { font-size: 1.4rem; color: var(--primary); margin: 0; display: flex; align-items: center; gap: 10px; }
        .admin-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .admin-btn:hover { opacity: 0.8; }

        /* لوحات التحكم */
        .panel { background: white; max-width: 600px; margin: 25px auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: none; animation: slideDown 0.4s ease; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        input, textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; margin: 10px 0; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); }
        .upload-area { border: 2px dashed #ddd; padding: 20px; text-align: center; border-radius: 10px; cursor: pointer; color: #777; margin-bottom: 15px; }
        .upload-area:hover { border-color: var(--primary); background: #f0f7ff; }

        /* عرض الأخبار */
        .news-feed { max-width: 650px; margin: 20px auto; padding: 0 15px; }
        .news-card { background: white; border-radius: 15px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .news-card:hover { transform: translateY(-5px); }
        .news-card img { width: 100%; height: 300px; object-fit: cover; }
        .news-content { padding: 20px; }
        .news-content h2 { margin: 0 0 10px 0; font-size: 1.3rem; color: #111; line-height: 1.4; }
        .news-content p { color: #636e72; line-height: 1.7; margin: 0; font-size: 0.95rem; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #f1f1f1; font-size: 0.8rem; color: #b2bec3; }
        
        .delete-btn { position: absolute; top: 15px; left: 15px; background: rgba(255, 71, 87, 0.9); color: white; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; display: none; }

        footer { text-align: center; margin-top: 40px; padding: 20px; color: #999; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <h1 id="displaySiteName"><i class="fas fa-city"></i> المحمودية مدينتي</h1>
    <button class="admin-btn" onclick="loginSystem()"><i class="fas fa-lock"></i> الإدارة</button>
</header>

<div id="publisher-panel" class="panel">
    <h3><i class="fas fa-plus-circle"></i> إضافة خبر جديد</h3>
    <input type="text" id="postTitle" placeholder="عنوان الخبر الجذاب...">
    <textarea id="postText" rows="4" placeholder="اكتب تفاصيل الخبر هنا..."></textarea>
    
    <div class="upload-area" onclick="document.getElementById('postFile').click()">
        <i class="fas fa-cloud-upload-alt fa-2x"></i>
        <p id="fileName">اضغط هنا لرفع صورة الخبر</p>
        <input type="file" id="postFile" accept="image/*" style="display: none;" onchange="updateFileName()">
    </div>
    
    <button class="admin-btn" style="width: 100%; padding: 15px;" id="publishBtn" onclick="uploadAndPublish()">نشر الخبر الآن</button>
</div>

<div id="owner-panel" class="panel" style="border: 2px solid var(--primary);">
    <h3><i class="fas fa-user-shield"></i> لوحة المالك النجم</h3>
    <input type="text" id="newSiteName" placeholder="تغيير اسم الموقع">
    <button class="admin-btn" onclick="updateSiteName()">تحديث اسم الموقع</button>
    <hr>
    <input type="text" id="newPubPass" placeholder="كلمة سر الناشر الجديدة">
    <button class="admin-btn" style="background: var(--accent);" onclick="updatePass()">تغيير كلمة السر وطرد الجميع</button>
</div>

<div class="news-feed" id="newsFeed">
    </div>

<footer>جميع الحقوق محفوظة لدى النجم &copy; 2026</footer>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        databaseURL: "https://mahmodya-73e03-default-rtdb.firebaseio.com",
        projectId: "mahmodya-73e03",
        storageBucket: "mahmodya-73e03.appspot.com" // تأكد من وجود هذا الرابط في الفايربيز عندك
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let currentRole = "";
    let currentPubPass = "2009257ma";

    // تحديث اسم الملف المختار
    function updateFileName() {
        const file = document.getElementById('postFile').files[0];
        document.getElementById('fileName').innerText = file ? file.name : "اضغط لرفع صورة";
    }

    // نظام الدخول
    async function loginSystem() {
        const { value: pass } = await Swal.fire({
            title: 'تسجيل دخول',
            input: 'password',
            inputAttributes: { autofocus: 'true' }
        });

        if (pass === "2009257mama") {
            currentRole = "owner";
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'block');
            Swal.fire('أهلاً يا ملك');
        } else if (pass === currentPubPass) {
            currentRole = "publisher";
            document.getElementById('publisher-panel').style.display = 'block';
            Swal.fire('أهلاً يا ناشر');
        }
        loadNews(); // تحديث العرض لإظهار أزرار الحذف للمالك
    }

    // رفع الصورة ثم النشر
    async function uploadAndPublish() {
        const title = document.getElementById('postTitle').value;
        const text = document.getElementById('postText').value;
        const file = document.getElementById('postFile').files[0];
        const btn = document.getElementById('publishBtn');

        if(!title || !text) return Swal.fire('خطأ', 'يرجى ملء العنوان والنص', 'error');
        
        btn.disabled = true;
        btn.innerText = "جاري الرفع...";

        let imageUrl = "";
        if(file) {
            const storageRef = storage.ref('news_images/' + Date.now() + "_" + file.name);
            await storageRef.put(file);
            imageUrl = await storageRef.getDownloadURL();
        }

        db.ref('news_posts').push({
            title: title,
            content: text,
            image: imageUrl,
            timestamp: Date.now()
        }).then(() => {
            btn.disabled = false;
            btn.innerText = "نشر الخبر الآن";
            document.getElementById('postTitle').value = "";
            document.getElementById('postText').value = "";
            document.getElementById('postFile').value = "";
            document.getElementById('fileName').innerText = "اضغط لرفع صورة";
            Swal.fire('تم النشر!', 'الخبر متاح للجميع الآن', 'success');
        });
    }

    // الوقت الذكي
    function timeAgo(ts) {
        const diff = Math.floor((Date.now() - ts) / 1000);
        if (diff < 60) return "الآن";
        if (diff < 3600) return `منذ ${Math.floor(diff/60)} دقيقة`;
        if (diff < 86400) return `منذ ${Math.floor(diff/3600)} ساعة`;
        return new Date(ts).toLocaleDateString('ar-EG');
    }

    // جلب الأخبار
    function loadNews() {
        db.ref('news_posts').on('value', (snapshot) => {
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = "";
            snapshot.forEach((child) => {
                const item = child.val();
                const key = child.key;
                const html = `
                    <div class="news-card">
                        ${currentRole === 'owner' ? `<button class="delete-btn" style="display:block" onclick="deletePost('${key}')"><i class="fas fa-trash"></i> حذف</button>` : ''}
                        ${item.image ? `<img src="${item.image}">` : ''}
                        <div class="news-content">
                            <h2>${item.title}</h2>
                            <p>${item.content}</p>
                            <div class="card-meta">
                                <span><i class="far fa-clock"></i> ${timeAgo(item.timestamp)}</span>
                                <span>المحمودية مباشر</span>
                            </div>
                        </div>
                    </div>
                `;
                feed.insertAdjacentHTML('afterbegin', html);
            });
        });
    }

    function deletePost(key) {
        Swal.fire({
            title: 'هل أنت متأكد؟',
            text: "لن يمكنك استعادة الخبر بعد الحذف",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4757',
            confirmButtonText: 'نعم، احذف'
        }).then((res) => {
            if(res.isConfirmed) db.ref('news_posts').child(key).remove();
        });
    }

    // مراقبة تغييرات الإعدادات
    db.ref('settings').on('value', snapshot => {
        const s = snapshot.val();
        if(s) {
            document.getElementById('displaySiteName').innerHTML = `<i class="fas fa-city"></i> ${s.siteName || 'المحمودية مدينتي'}`;
            if(currentRole === 'publisher' && currentPubPass !== s.pubPass) location.reload();
            currentPubPass = s.pubPass || "2009257ma";
        }
    });

    function updateSiteName() {
        const n = document.getElementById('newSiteName').value;
        if(n) db.ref('settings').update({ siteName: n });
    }

    function updatePass() {
        const p = document.getElementById('newPubPass').value;
        if(p) db.ref('settings').update({ pubPass: p }).then(() => Swal.fire('تم التغيير وطرد الجميع'));
    }

    loadNews();
</script>

</body>
</html>
