<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة أخبار المحمودية</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #1a73e8; --owner: #673ab7; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        header { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        #siteLogo { width: 40px; height: 40px; border-radius: 50%; display: none; }
        
        .panel { background: white; max-width: 600px; margin: 20px auto; padding: 20px; border-radius: 15px; display: none; border: 1px solid #ddd; }
        .owner-section { border: 2px solid var(--owner); }
        
        .news-card { background: white; border-radius: 15px; margin: 15px auto; max-width: 600px; overflow: hidden; border: 1px solid #eee; position: relative; }
        .news-card img { width: 100%; max-height: 400px; object-fit: cover; }
        .news-info { padding: 15px; }
        .author-tag { font-size: 12px; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: block; }
        
        .admin-btn { cursor: pointer; background: #eee; border: none; padding: 8px 15px; border-radius: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; }
        
        .request-item { background: #f0f7ff; padding: 10px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .approve-btn { background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img id="siteLogo" src="">
        <h1 id="siteNameDisplay" style="font-size: 1.2rem; margin: 0;">المحمودية</h1>
    </div>
    <button class="admin-btn" onclick="handleLogin()"><i class="fas fa-lock"></i> دخول</button>
</header>

<div id="owner-panel" class="panel owner-section">
    <h3 style="color: var(--owner);"><i class="fas fa-crown"></i> لوحة المالك النجم</h3>
    <div id="pendingRequests">
        <p style="font-size: 13px; color: #666;">لا توجد طلبات انضمام حالياً.</p>
    </div>
    <hr>
    <input type="text" id="setSiteName" placeholder="اسم الموقع">
    <input type="text" id="setLogo" placeholder="رابط اللوجو المباشر">
    <button class="btn-blue" style="background:var(--owner)" onclick="saveSettings()">حفظ الإعدادات</button>
</div>

<div id="publisher-panel" class="panel">
    <h3><i class="fas fa-plus"></i> إضافة خبر جديد</h3>
    <p id="welcomeMsg" style="font-size: 13px; color: var(--primary);"></p>
    <input type="text" id="newsTitle" placeholder="عنوان الخبر">
    <textarea id="newsContent" rows="4" placeholder="تفاصيل الخبر..."></textarea>
    <input type="text" id="newsImg" placeholder="رابط الصورة المباشر (ImgBB)">
    <button class="btn-blue" onclick="postNews()">نشر الخبر</button>
</div>

<div id="newsFeed"></div>

<script>
    const firebaseConfig = {
        databaseURL: "https://mahmodya-73e03-default-rtdb.firebaseio.com",
        projectId: "mahmodya-73e03",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userRole = "";
    let userData = null;
    let siteSettings = {};

    // جلب الإعدادات
    db.ref('settings').on('value', s => {
        siteSettings = s.val() || {};
        document.getElementById('siteNameDisplay').innerText = siteSettings.siteName || "المحمودية مدينتي";
        if(siteSettings.logoUrl) {
            document.getElementById('siteLogo').src = siteSettings.logoUrl;
            document.getElementById('siteLogo').style.display = 'block';
        }
    });

    // نظام الدخول المعقد
    async function handleLogin() {
        const { value: pass } = await Swal.fire({ title: 'أدخل كلمة السر', input: 'password' });
        
        if (pass === "2009257mama") {
            userRole = "owner";
            document.getElementById('owner-panel').style.display = 'block';
            document.getElementById('publisher-panel').style.display = 'block';
            loadPending();
            loadNews();
        } else if (pass === (siteSettings.pubPass || "2009257ma")) {
            const { value: info } = await Swal.fire({
                title: 'بيانات الناشر',
                html: '<input id="n" class="swal2-input" placeholder="الاسم المعتمد"><input id="p" class="swal2-input" placeholder="رقم الموبايل">',
                preConfirm: () => [document.getElementById('n').value, document.getElementById('p').value]
            });
            
            if(info[0] && info[1]) {
                checkPublisher(info[0], info[1]);
            }
        }
    }

    function checkPublisher(name, phone) {
        db.ref('approved_publishers').child(phone).once('value', s => {
            if(s.exists()) {
                userRole = "publisher";
                userData = { name, phone };
                document.getElementById('publisher-panel').style.display = 'block';
                document.getElementById('welcomeMsg').innerText = "مرحباً يا " + name;
                loadNews();
            } else {
                db.ref('pending_publishers').child(phone).set({ name, phone });
                Swal.fire('طلبك قيد المراجعة', 'تم إرسال بياناتك للمالك، انتظر الموافقة للنشر.', 'info');
            }
        });
    }

    function loadPending() {
        db.ref('pending_publishers').on('value', s => {
            const div = document.getElementById('pendingRequests');
            div.innerHTML = "<h4>طلبات انضمام جديدة:</h4>";
            s.forEach(child => {
                const p = child.val();
                div.innerHTML += `<div class="request-item">
                    <span>${p.name} (${p.phone})</span>
                    <button class="approve-btn" onclick="approvePub('${p.name}','${p.phone}')">موافقة</button>
                </div>`;
            });
        });
    }

    function approvePub(name, phone) {
        db.ref('approved_publishers').child(phone).set({ name }).then(() => {
            db.ref('pending_publishers').child(phone).remove();
        });
    }

    function postNews() {
        const t = document.getElementById('newsTitle').value;
        const c = document.getElementById('newsContent').value;
        let i = document.getElementById('newsImg').value;
        
        if(i.includes('[img]')) i = i.match(/\[img\](.*?)\[\/img\]/)[1];

        db.ref('news_posts').push({
            title: t, content: c, image: i,
            author: userData ? userData.name : "المالك",
            phone: userData ? userData.phone : "إدارة الموقع",
            timestamp: Date.now()
        }).then(() => Swal.fire('تم النشر!'));
    }

    function loadNews() {
        db.ref('news_posts').on('value', s => {
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = "";
            s.forEach(child => {
                const v = child.val();
                feed.insertAdjacentHTML('afterbegin', `
                    <div class="news-card">
                        ${v.image ? `<img src="${v.image}">` : ''}
                        <div class="news-info">
                            <span class="author-tag">نشر بواسطة: ${v.author} ${userRole==='owner' ? '('+v.phone+')' : ''}</span>
                            <h2>${v.title}</h2>
                            <p>${v.content}</p>
                        </div>
                    </div>
                `);
            });
        });
    }

    function saveSettings() {
        const name = document.getElementById('setSiteName').value;
        const logo = document.getElementById('setLogo').value;
        db.ref('settings').update({ siteName: name, logoUrl: logo });
    }

    loadNews();
</script>
</body>
</html>
